services:
  postgres:
    image: postgres:16-alpine
    container_name: uniform_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-uniform}
      POSTGRES_USER: ${POSTGRES_USER:-uniform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - uniform_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uniform} -d ${POSTGRES_DB:-uniform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uniform_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-uniform}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-uniform}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      FIRST_ADMIN_USERNAME: ${FIRST_ADMIN_USERNAME}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD}
      FIRST_ADMIN_FIRST_NAME: ${FIRST_ADMIN_FIRST_NAME:-Admin}
      FIRST_ADMIN_LAST_NAME: ${FIRST_ADMIN_LAST_NAME:-Sistema}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://form.tu-emprendimiento.tech}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - uniform_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://form.tu-emprendimiento.tech/api}
    container_name: uniform_frontend
    restart: unless-stopped
    networks:
      - uniform_net

  nginx:
    image: nginx:alpine
    container_name: uniform_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
      - uploads_data:/var/uploads:ro
    networks:
      - uniform_net

  certbot:
    image: certbot/certbot
    container_name: uniform_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  uploads_data:
  certbot_www:
  certbot_conf:

networks:
  uniform_net:
    driver: bridge
