server {
    listen 80;
    server_name form.tu-emprendimiento.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name form.tu-emprendimiento.tech;

    ssl_certificate     /etc/letsencrypt/live/form.tu-emprendimiento.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/form.tu-emprendimiento.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 15M;

    # API backend
    location /api/ {
        proxy_pass         http://uniform_backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Archivos subidos (servidos directamente por Nginx)
    location /uploads/ {
        alias /var/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend SPA
    location / {
        proxy_pass         http://uniform_frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        try_files $uri $uri/ /index.html;
    }
}
